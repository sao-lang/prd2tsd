services:
  postgres:
    image: postgres:15
    container_name: prd2tsd-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prd2tsd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prd2tsd-network

  redis:
    image: redis:7
    container_name: prd2tsd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prd2tsd-network

  minio:
    image: minio/minio:latest
    container_name: prd2tsd-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prd2tsd-network

  neo4j:
    image: neo4j:5
    container_name: prd2tsd-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jpassword", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - prd2tsd-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: prd2tsd-jaeger
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prd2tsd-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prd2tsd-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prd2tsd-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prd2tsd-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/prd2tsd
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - PROMETHEUS_PORT=9090
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - prd2tsd-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prd2tsd-celery-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/prd2tsd
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
    command: celery -A app.batch.tasks worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - prd2tsd-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prd2tsd-celery-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/prd2tsd
      - REDIS_URL=redis://redis:6379/0
    command: celery -A app.batch.scheduler beat --loglevel=info
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - prd2tsd-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  neo4j_data:

networks:
  prd2tsd-network:
    driver: bridge
