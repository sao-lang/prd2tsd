name: 手动触发生产部署

on:
  workflow_dispatch:
    inputs:
      version:
        description: "部署版本（Git tag）"
        required: true
        default: "v0.1.0"
      environment:
        description: "部署环境"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/prd2tsd-api:${{ github.event.inputs.version }}
            ${{ secrets.DOCKER_REGISTRY }}/prd2tsd-api:latest

      - name: 部署到服务器
        run: |
          echo "部署版本: ${{ github.event.inputs.version }}"
          echo "部署环境: ${{ github.event.inputs.environment }}"
          # VIBE_DEFER(块 D): 添加实际 SSH 部署步骤
